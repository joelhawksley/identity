<!doctype html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} - {% endif %}Joel Hawksley</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="chrome=1">

    <meta content="Joel Hawksley" name="author">
    <meta content=#fff name=theme-color>
    <meta content="hawksley.org" property="og:site_name">
    <meta content="joel@hawksley.org" property="og:email">
    <meta content=blog property=og:type>
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
    <link rel="icon" type="image/jpeg" href="/img/about/joel.jpg">
    <link rel="me" href="https://ruby.social/@joelhawksley">
    <link rel="stylesheet" href="/code.css">
    {% assign og_image = page.image | default: site.default_image %}

    {% if og_image %}
      <meta property="og:image" content="{{ og_image | absolute_url }}">
      <meta name="twitter:card" content="summary_large_image">
      <meta name="twitter:image" content="{{ og_image | absolute_url }}">
    {% endif %}
    <style>
      :root {
        --mono-font: San Francisco Mono, Monaco, "Consolas", "Lucida Console", "DejaVu Sans Mono", "Bitstream Vera Sans Mono", monospace;
        --sans-font: -apple-system, BlinkMacSystemFont, "avenir next", avenir,helvetica, "helvetica neue", ubuntu, roboto, noto, "segoe ui", arial, sans-serif
      }

      body {
        margin: 0 auto;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        line-height: 1.6;
        font-size: 1rem;
        font-family: var(--sans-font);
        max-width: 40rem;
        padding-left: 1rem;
        padding-right: 1rem;
      }

      h1, h2, h4 {
        margin-bottom: .5rem;
        line-height: 1.25;
        font-weight: 600;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0;
      }

      h2 {
        font-size: 1.25rem;
        padding-bottom: 0;
        margin-top: 2rem;
      }

      h3 {
        font-size: 1rem;
        margin-bottom: 0;
      }

      blockquote {
        border-left: 5px solid lightgray;
        margin-inline-start: 0;
        padding-inline-start: 1.5rem;
        font-style: italic;
      }

      h4 {
        font-size: 1rem;
      }

      img, video, iframe {
        width: 100%;
        max-width: 40rem;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.5);
      }

      figure {
        margin: 1.5rem 0;
        padding: 0;
      }

      figure img {
        display: block;
      }

      figcaption {
        font-size: 0.85rem;
        color: #555;
        margin-top: 0.4rem;
      }

      nav {
        margin-left: .75rem;
        margin-bottom: 2rem;
      }

      p {
        margin-top: 0;
      }

      nav a {
        text-decoration: none;
        display: inline-block;
        padding: 0 .25rem;
      }

      .highlight {
        white-space: pre-wrap;
        word-break: break-all;
      }

      ul.posts {
        list-style: none;
        padding-left: 0;
      }

      time {
        font-variant-numeric: tabular-nums;
      }

      time.subhead {
        margin-bottom: 1em;
        display: inline-block;
      }

      .presentation {
        margin-bottom: 2rem;
      }

      table.slides {
        border: none;
        border-collapse: collapse;
      }

      table.slides tr {
        margin-bottom: 20px;
      }

      table.slides td {
        vertical-align: top;
        width: 50%;
        border-top: 1px solid grey;
        padding: 1rem 0;
      }

      table.slides td.note {
        padding: 1rem 0 1rem 1rem;
      }

      @media(max-width: 700px) {
        table.slides tr {
          display: block;
          margin-bottom: 40px;
        }
        table.slides td {
          display: block;
          width: initial;
        }

        table.slides td.note {
          padding: 10px 0;
        }
      }

      table.slides img {
        max-width: 100%;
      }

      @media (prefers-color-scheme: dark) {
        img, video, iframe {
          box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        }
      }

      footer {
        border-top: 1px solid #ccc;
        margin-top: 1rem;
        padding: 1rem 0;
      }

      footer p {
        text-align: center;
        font-size: 0.8rem;
      }

      header {
        font-size: 1rem;
        margin: 0 0 4rem;
        line-height: 1.4;
        padding-top: 2rem;
        display: flex;
        align-items: center;
        gap: .75rem;
      }

      header .avatar-link {
        display: flex;
      }

      header .avatar {
        width: 3.25rem;
        height: 3.25rem;
        border-radius: 50%;
        object-fit: cover;
      }

      header .info {
        line-height: 1.3;
      }

      header .name a {
        color: black;
        text-decoration: none;
        font-weight: bold;
      }

      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      .skip-link:focus {
        position: static;
        width: auto;
        height: auto;
        padding: 0.5rem 1rem;
        background: #000;
        color: #fff;
        z-index: 100;
      }

      a:focus-visible, button:focus-visible {
        outline: 2px solid #005fcc;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header>
      <a href="/" class="avatar-link"><img src="/img/about/joel.jpg" alt="Joel Hawksley" class="avatar"></a>
      <div class="info">
        <div class="name"><a href="/">Joel Hawksley</a></div>
        <div><a href="mailto:joel@hawksley.org">joel@hawksley.org</a></div>
      </div>
    </header>
    <main id="main-content">
      {{ content }}
    </main>
    <footer style="font-size: .8rem; margin-bottom: 2rem;">&copy; 2004-{{ 'now' | date: "%Y" }} Joel Hawksley | <a href="/feed.xml" target="_blank" rel="noopener" aria-label="RSS feed (opens in a new tab)">RSS</a></footer>
    {% if page.layout == 'post' %}
    <script src="/js/mermaid.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async function() {
        mermaid.initialize({startOnLoad:true});
        await mermaid.run({
          querySelector: '.language-mermaid',
        });
      });
    </script>
    {% endif %}
  </body>
</html>

name: Extract Worship Songs

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 12:00 UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  extract-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r scripts/worship-songs/requirements.txt

      - name: Set up YouTube OAuth credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.YOUTUBE_OAUTH_TOKEN_JSON }}' > token.json

      - name: Run extraction and upload
        env:
          YOUTUBE_CHANNEL_URL: "https://www.youtube.com/@christtheservantlutheranch5318"
        run: python scripts/worship-songs/extract_songs.py

      - name: Clean up credentials
        if: always()
        run: rm -f client_secret.json token.json
